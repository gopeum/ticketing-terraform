apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketing-config
  namespace: ticketing
data:
  AWS_REGION: "ap-northeast-2"
  DB_NAME: "ticketing"
  DB_PORT: "3306"
  REDIS_PORT: "6379"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
---
