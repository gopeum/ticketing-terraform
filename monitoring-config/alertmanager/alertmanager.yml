global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait:      10s
  group_interval:  5m
  repeat_interval: 1h
  receiver: 'discord-warning'

  routes:
    - match:
        severity: critical
      receiver: 'discord-critical'
      repeat_interval: 15m
      continue: false

    - match:
        severity: warning
      receiver: 'discord-warning'
      repeat_interval: 1h

receivers:
  - name: 'discord-critical'
    webhook_configs:
      - url: '${DISCORD_WEBHOOK_CRITICAL}'
        send_resolved: true
        http_config:
          follow_redirects: true
        title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          **상태**: {{ .Status | toUpper }}
          **요약**: {{ .Annotations.summary }}
          **설명**: {{ .Annotations.description }}
          **시작**: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          ---
          {{ end }}

  - name: 'discord-warning'
    webhook_configs:
      - url: '${DISCORD_WEBHOOK_WARNING}'
        send_resolved: true
        title: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          **상태**: {{ .Status | toUpper }}
          **요약**: {{ .Annotations.summary }}
          {{ end }}

inhibit_rules:
  # Critical 알림이 있으면 동일 대상 Warning 억제
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
